<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Online Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

<header>
    <h1>Mini Online Shop 🛒</h1>
    <button id="theme-toggle">🌙 Tungi rejim</button>
</header>

<div class="container">
    <main class="products-grid" id="products">
        <!-- Mahsulotlar JS orqali chiqariladi -->
    </main>

    <aside class="cart-section sidebar" id="cart-section">
        <h3>Savatcha 🛒</h3>
        <div id="cart-items">
            <p>Savatcha bo'sh</p>
        </div>
        <hr>
        <h4>Jami: $<span id="total-price">0</span></h4>
        <button class="btn-clear" onclick="clearCart()">Tozalash</button>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
